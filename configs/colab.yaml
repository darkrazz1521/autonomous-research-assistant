runtime:
  environment: colab

storage:
  root_dir: /content/autonomous-research-assistant
  datasets_dir: /content/autonomous-research-assistant/datasets

  raw_dir: /content/autonomous-research-assistant/datasets/raw
  processed_dir: /content/autonomous-research-assistant/datasets/processed
  metadata_dir: /content/autonomous-research-assistant/datasets/metadata
  external_dir: /content/autonomous-research-assistant/datasets/external
  state_dir: /content/autonomous-research-assistant/datasets/state

  logs_dir: /content/autonomous-research-assistant/logs

  huggingface_cache_dir: /content/autonomous-research-assistant/datasets/external/hf_cache
  huggingface_home_dir: /content/autonomous-research-assistant/datasets/external/hf_home

  local_source_code_only: true

colab:
  enabled: true
  mount_google_drive: false
  google_drive_mount_point: /content/drive
  google_drive_project_dir: /content/drive/MyDrive/autonomous_research_assistant
  prefer_drive_storage: false
  require_gpu: false

arxiv:
  batch_size: 20
  max_api_results_per_run: 40
  max_pdf_downloads_per_run: 20
  pdf_download_concurrency: 2
  request_pause_seconds: 3.0
  download_timeout_seconds: 180

  simple_mode:
    max_results: 12
    delay_between_downloads_seconds: 8.0
    search_page_size: 30

pdf_processing:
  max_papers_per_run: 12
  batch_size: 2

  chunk_size: 420
  chunk_overlap: 70
  max_overlap_paragraphs: 1

retrieval:
  embedding:
    batch_size: 24
    device: auto

  quality:
    min_semantic_density: 0.35
    max_table_probability: 0.55
    max_noise_score: 0.60
    min_quality_score: 0.45

rag:
  generation:
    provider: heuristic
    streaming: false
    timeout_seconds: 90
  prompts:
    max_context_chunks: 6
    max_prompt_chars: 12000
  context_processing:
    compression_enabled: true
    mmr_enabled: true
  agentic:
    enabled: true
    max_reasoning_steps: 3
