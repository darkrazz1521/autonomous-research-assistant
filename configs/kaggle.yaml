project_name: autonomous-research-assistant-phase2
profile: kaggle

storage:
  root_dir: /kaggle/working
  datasets_dir: /kaggle/working/datasets
  raw_dir: /kaggle/working/datasets/raw
  processed_dir: /kaggle/working/datasets/processed
  metadata_dir: /kaggle/working/datasets/metadata
  external_dir: /kaggle/working/datasets/external
  state_dir: /kaggle/working/datasets/state
  logs_dir: /kaggle/working/logs
  huggingface_cache_dir: /kaggle/working/datasets/external/hf_cache
  parquet_export_enabled: true
  local_source_code_only: true

logging:
  level: INFO
  console_enabled: true
  ingestion_log_file: /kaggle/working/logs/ingestion/ingestion.jsonl
  failure_log_file: /kaggle/working/logs/failed/failures.jsonl

retry:
  max_attempts: 5
  base_delay_seconds: 1.0
  max_delay_seconds: 30.0
  backoff_multiplier: 2.0
  jitter_seconds: 0.5

arxiv:
  enabled: true
  base_url: https://export.arxiv.org/api/query

  categories:
    - cs.AI
    - cs.CL
    - cs.LG

  batch_size: 10

  max_api_results_per_run: 30

  max_pdf_downloads_per_run: 20

  pdf_download_concurrency: 2

  request_timeout_seconds: 30

  download_timeout_seconds: 180

  request_pause_seconds: 5

  user_agent: autonomous-research-assistant-phase2-kaggle/1.0

  incremental_lookback_days: 3

  save_metadata_format: json

  verify_existing_files: true

datasets:
  scifact:
    enabled: true
    loader: huggingface
    huggingface_dataset_id: allenai/scifact
    configs:
      - claims
      - corpus
    split_overrides: {}
    trust_remote_code: false
    export_format: parquet
    export_enabled: true
  fever:
    enabled: true
    loader: huggingface
    huggingface_dataset_id: fever/fever
    configs: []
    split_overrides: {}
    trust_remote_code: false
    export_format: parquet
    export_enabled: true
  msmarco:
    enabled: true
    loader: huggingface
    huggingface_dataset_id: microsoft/ms_marco
    configs:
      - v2.1
    split_overrides: {}
    trust_remote_code: false
    export_format: parquet
    export_enabled: true

validation:
  require_non_empty_splits: true
  verify_pdf_files: true
  verify_metadata_files: true
  fail_on_missing_manifest_entries: false

