project_name: autonomous-research-assistant-phase3

runtime:
  environment: local
  auto_detect: true

storage:
  root_dir: .
  datasets_dir: datasets
  raw_dir: datasets/raw
  processed_dir: datasets/processed
  metadata_dir: datasets/metadata
  external_dir: datasets/external
  state_dir: datasets/state
  logs_dir: logs
  huggingface_cache_dir: datasets/external/hf_cache
  huggingface_home_dir: datasets/external/hf_home
  parquet_export_enabled: true
  local_source_code_only: false

logging:
  level: INFO
  console_enabled: true
  ingestion_log_file: logs/ingestion/ingestion.jsonl
  failure_log_file: logs/failed/failures.jsonl

retry:
  max_attempts: 4
  base_delay_seconds: 1.0
  max_delay_seconds: 20.0
  backoff_multiplier: 2.0
  jitter_seconds: 0.25

huggingface:
  datasets_version: 2.19.1
  supported_datasets_major_minor: "2.19"
  hub_version: 0.23.4
  token_env_var: HF_TOKEN
  enable_version_guard: true
  log_future_warnings: true
  offline_mode: false

colab:
  enabled: false
  mount_google_drive: false
  google_drive_mount_point: /content/drive
  google_drive_project_dir: /content/drive/MyDrive/autonomous_research_assistant
  prefer_drive_storage: false
  require_gpu: false

arxiv:
  enabled: true
  base_url: https://export.arxiv.org/api/query
  categories:
    - cs.AI
    - cs.CL
    - cs.LG
  batch_size: 100
  max_api_results_per_run: 500
  max_pdf_downloads_per_run: 250
  pdf_download_concurrency: 8
  request_timeout_seconds: 30
  download_timeout_seconds: 120
  request_pause_seconds: 0.5
  user_agent: autonomous-research-assistant-phase2/1.0
  incremental_lookback_days: 2
  save_metadata_format: json
  verify_existing_files: true
  simple_mode:
    enabled: true
    max_results: 15
    delay_between_downloads_seconds: 7.0
    search_page_size: 30
    sort_by: submittedDate
    sort_order: descending
    metadata_only: false
    resume_from_manifest: true

datasets:
  scifact:
    enabled: true
    loader: huggingface
    huggingface_dataset_id: allenai/scifact
    configs:
      - claims
      - corpus
    split_overrides: {}
    revision: main
    trust_remote_code: false
    allow_legacy_script_fallback: true
    streaming: false
    data_dir: null
    data_files: null
    export_format: parquet
    export_enabled: true
    loader_kwargs: {}
  fever:
    enabled: true
    loader: huggingface
    huggingface_dataset_id: fever/fever
    configs:
      - v1.0
    split_overrides: {}
    revision: main
    trust_remote_code: true
    allow_legacy_script_fallback: true
    streaming: false
    data_dir: null
    data_files: null
    export_format: parquet
    export_enabled: true
    loader_kwargs: {}
  msmarco:
    enabled: true
    loader: huggingface
    huggingface_dataset_id: microsoft/ms_marco
    configs:
      - v1.1
    split_overrides: {}
    revision: main
    trust_remote_code: true
    allow_legacy_script_fallback: true
    streaming: false
    data_dir: null
    data_files: null
    export_format: parquet
    export_enabled: true
    loader_kwargs: {}

validation:
  require_non_empty_splits: true
  verify_pdf_files: true
  verify_metadata_files: true
  fail_on_missing_manifest_entries: false

pdf_processing:
  enabled: true
  source_pdf_dir: datasets/raw/arxiv/pdfs
  source_metadata_dir: datasets/raw/arxiv/metadata
  front_matter_dir: datasets/processed/front_matter
  extracted_text_dir: datasets/processed/extracted_text
  cleaned_text_dir: datasets/processed/cleaned_text
  repaired_text_dir: datasets/processed/repaired_text
  sections_dir: datasets/processed/sections
  chunks_dir: datasets/processed/chunks
  references_dir: datasets/processed/references
  citations_dir: datasets/processed/citations
  equation_blocks_dir: datasets/processed/equation_blocks
  isolated_figures_dir: datasets/processed/isolated_figures
  isolated_tables_dir: datasets/processed/isolated_tables
  heading_analysis_dir: datasets/processed/heading_analysis
  dedup_reports_dir: datasets/processed/dedup_reports
  repair_reports_dir: datasets/processed/repair_reports
  manifests_dir: datasets/processed/manifests
  validation_dir: datasets/processed/validation
  reports_dir: datasets/processed/reports
  analytics_dir: datasets/processed/analytics
  extraction_backend: pymupdf
  fallback_backends:
    - pdfplumber
  max_papers_per_run: 25
  batch_size: 5
  overwrite_existing: false
  chunk_size: 450
  chunk_overlap: 80
  min_overlap_paragraphs: 1
  max_overlap_paragraphs: 2
  min_chunk_tokens: 120
  max_chunk_tokens: 650
  abstract_chunk_max_tokens: 220
  repair_overlap_buffer_tokens: 140
  paragraph_merge_line_threshold: 85
  section_min_confidence: 0.45
  layout_aware_default: true
  dedup_strict_default: false
  equation_repair_level: balanced
  enable_column_reconstruction: true
  cleaning_rules:
    remove_repeated_headers: true
    remove_repeated_footers: true
    remove_page_numbers: true
    normalize_unicode: true
    collapse_whitespace: true
    deduplicate_lines: true
    strip_reference_noise: false
    dehyphenate_line_breaks: true
    repair_broken_sentences: true
    suppress_running_titles: true
    filter_captions: true
    filter_affiliations: true
    filter_watermarks: true
    smart_newline_reconstruction: true
  validation_rules:
    min_extraction_chars: 1500
    min_chunk_chars: 250
    max_noise_ratio: 0.35
    max_duplicate_chunk_ratio: 0.2
    max_tiny_chunk_ratio: 0.3
    max_oversized_chunk_ratio: 0.1
    min_retrieval_quality_score: 0.5
    max_reference_leakage_count: 1
    max_equation_fragmentation_count: 1

retrieval:
  embeddings_dir: datasets/embeddings
  vector_indexes_dir: datasets/vector_indexes
  retrieval_cache_dir: datasets/retrieval_cache
  retrieval_analytics_dir: datasets/retrieval_analytics
  rerank_cache_dir: datasets/rerank_cache
  memory_graph_dir: datasets/memory_graph
  retrieval_evaluation_dir: datasets/retrieval_evaluation
  manifests_dir: datasets/vector_indexes/manifests
  embedding:
    default_model: BAAI/bge-base-en-v1.5
    supported_models:
      - BAAI/bge-base-en-v1.5
      - BAAI/bge-large-en-v1.5
      - intfloat/e5-base-v2
      - BAAI/bge-m3
    batch_size: 16
    normalize_embeddings: true
    max_length: 512
    device: auto
    deterministic_fallback_dim: 768
    cache_enabled: true
    min_retrieval_quality_score: 0.55
    include_flagged_chunks: false
    quality_filtering_default: false
  vector_db:
    default_backend: faiss
    supported_backends:
      - faiss
      - qdrant
      - lancedb
      - chroma
    namespace: scientific-corpus
    metric: cosine
    rebuild_on_schema_change: true
    incremental_updates: true
    version: v1
  reranker:
    enabled: true
    default_model: BAAI/bge-reranker-base
    supported_models:
      - BAAI/bge-reranker-base
      - jinaai/jina-reranker-v1-turbo-en
      - cross-encoder/ms-marco-MiniLM-L-6-v2
    top_k_depth: 20
    section_priority_boost: 0.08
    citation_sensitivity_boost: 0.06
  search:
    dense_top_k: 20
    sparse_top_k: 20
    final_top_k: 10
    hybrid_fusion: rrf
    dense_weight: 0.65
    sparse_weight: 0.35
    rrf_k: 60
    include_neighbors: true
    neighbor_window: 1
    citation_expansion: true
    section_aware_boost: true
  evaluation:
    enabled: true
    default_top_k: 10
    default_probe_count: 25
    use_manual_probes: true
    use_scifact_when_available: true
  quality:
    min_semantic_density: 0.35
    max_table_probability: 0.55
    max_noise_score: 0.60
    min_quality_score: 0.45
    skip_low_quality_before_embedding: false
    mark_excluded_chunks: true
    cache_enabled: true
  section_weights:
    enabled: true
    weights:
      abstract: 1.30
      introduction: 1.15
      methodology: 1.20
      methods: 1.20
      results: 1.05
      discussion: 1.10
      conclusion: 1.20
      appendix: 0.70
      references: 0.25
    default_weight: 1.0
  context_window:
    enabled: true
    radius: 1
    max_context_chunks: 5
    merge_strategy: ordered
    max_merged_tokens: 1200
  query_expansion:
    enabled: false
    acronym_expansion: true
    synonym_mapping: true
    normalize_plurals: true
    abbreviation_recovery: true
  fusion:
    method: rrf
    rrf_k: 60
    dense_weight: 0.55
    sparse_weight: 0.25
    rerank_weight: 0.20
    normalize_dense_sparse: true

rag:
  rag_cache_dir: datasets/rag_cache
  rag_outputs_dir: datasets/rag_outputs
  research_sessions_dir: datasets/research_sessions
  rag_evaluation_dir: datasets/rag_evaluation
  generated_answers_dir: datasets/generated_answers
  rag_observability_dir: datasets/rag_observability
  generation:
    provider: heuristic
    model_name: heuristic-grounded-generator
    supported_models:
      - heuristic-grounded-generator
      - Qwen2.5
      - Llama 3
      - DeepSeek
      - Mistral
    api_base: null
    api_key_env_var: OPENAI_API_KEY
    temperature: 0.1
    top_p: 0.95
    max_tokens: 700
    context_window: 4096
    repetition_penalty: 1.05
    stop_sequences: []
    seed: 42
    streaming: false
    timeout_seconds: 60
    max_retries: 2
    deterministic_fallback_enabled: true
    grounded_synthesis_mode: true
    citation_constrained_generation: true
    deterministic_evaluation_mode: true
  grounding:
    min_grounding_score: 0.55
    max_hallucination_probability: 0.45
    min_citation_coverage: 0.60
    low_confidence_warning_threshold: 0.50
  synthesis:
    max_evidence_chunks: 8
    max_sentences_per_chunk: 3
    merge_overlapping_evidence: true
    inline_citation_style: paper_section
    bibliography_enabled: true
  multi_hop:
    enabled: false
    max_hops: 2
    follow_up_queries_per_hop: 2
    top_k_per_hop: 6
    include_concept_chaining: true
    include_entity_expansion: true
  answer_quality:
    min_overall_answer_quality_score: 0.50
    redundancy_penalty_weight: 0.15
    factual_consistency_weight: 0.25
    retrieval_alignment_weight: 0.20
  memory:
    enabled: true
    max_history_items: 20
    max_active_topics: 12
    save_sessions_by_default: true
  prompts:
    max_context_chunks: 8
    max_prompt_chars: 16000
    qa_template: qa
    summarization_template: summarization
    comparison_template: comparison
    contradiction_template: contradiction
    literature_review_template: literature_review
  query_understanding:
    enabled: true
    intent_classification: true
    acronym_expansion: true
    entity_extraction: true
    topic_extraction: true
  routing:
    section_routing_enabled: true
    topic_routing_enabled: true
    benchmark_routing_enabled: true
    definition_depth: 8
    comparison_depth: 10
    literature_review_depth: 12
    paper_cluster_limit: 8
  context_processing:
    compression_enabled: true
    mmr_enabled: true
    mmr_lambda: 0.70
    target_reduction_ratio: 0.50
    max_sentences_per_chunk: 2
    compression_cache_enabled: true
  reranking:
    enabled: true
    precision_model: heuristic-answerability-reranker
    supported_models:
      - heuristic-answerability-reranker
      - BAAI/bge-reranker-v2-m3
      - jina-reranker-v2
      - cross-encoder/ms-marco-MiniLM-L-6-v2
    answerability_weight: 0.30
    citation_density_weight: 0.10
    section_relevance_weight: 0.15
    semantic_intent_weight: 0.20
  observability:
    enabled: true
    log_prompt_efficiency: true
    log_chunk_utilization: true
    log_reranker_lift: true
  agentic:
    enabled: true
    max_reasoning_steps: 4
    retrieval_retry_limit: 3
    reflection_enabled: true
    refinement_enabled: true
    contradiction_detection_enabled: true

writer:
  enabled: true
  generated_reports_dir: datasets/generated_reports
  writer_sessions_dir: datasets/writer_sessions
  writer_observability_dir: datasets/writer_observability
  writer_evaluation_dir: datasets/writer_evaluation
  max_revision_passes: 3
  max_sections: 10
  grounding_threshold: 0.7
  citation_style: ieee
  style: technical
  export_format: markdown
  max_subsections_per_section: 3
  max_section_context_chunks: 8
  evidence_coverage_threshold: 0.65
  min_section_grounding_score: 0.55
  max_writer_tokens: 1400
